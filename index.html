<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css"
    integrity="sha384-9aIt2nRpC12Uk9gS9baDl411NQApFmC26EwAOH8WgZl5MYYxFfc+NcPb1dKGj7Sk" crossorigin="anonymous">

    <script src="https://kit.fontawesome.com/fdf8c977f5.js" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="./Assets/style.css">
    <title>Weather-Dash</title>
</head>

<body>
    <header class="container">
        <div class="title">
            <h1>Weather Dashboard</h1>
        </div>
    </header>

    <main class="container dashboard">
        <div class="row p-2">

            <div class="col-sm12 col-md-9 order-md-2">
                <div class="row">
                    <!--current weather-->
                    <div class="col-12 weather p-0">
                        <div class="d-flex city">
                            <h2 id="place"></h2>
                            <h3 id="date"></h3>
                            <img id="weather-icons"/>
                        </div>
                        <p class="pt-1 pl-2">Temperature: <span id="temp"></span> &deg;F</p>
                        <p class="pl-2">Wind: <span id="windSpeed">MPH</span></p>
                        <p class="pl-2">Humidity: <span id="humid">%</span></p>
                        <p class="pl-2">UV Index: <span id="uvIndex"></span></p>
                    </div>
                   
                    <div class="col-12 fiveDay">
                        <h2>5 Day Forcast</h2>
                        <div class="row">
                            <div class="cool-sm-10 col-md-4 offset-lg-1 col-lg-2 p-1">
                                <div class="card day-1 m-0 text-center">
                                    <div class="card-body p-1">
                                        <p class="card-title"></p>
                                        <img class="fiveDay-img mb-2"/>
                                        <p class="card-subtitle mb-2 text-muted">Temp: 
                                            <span class="fiveDay-temp"> &deg;F</span></p>
                                        <p class="card-subtitle mb-2 text-muted">Wind: 
                                            <span id="fiveDay-wind">MPH</span></p> 
                                        <p class="card-subtitle mb-2 text-muted">Humidity: <span id="fiveDay-humid">%</span></p>       
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="cool-sm-10 col-md-4 offset-lg-1 col-lg-2 p-1">
                        <div class="card day-2 m-0 text-center">
                            <div class="card-body p-1">
                                <p class="card-title"></p>
                                <img class="fiveDay-img mb-2"/>
                                <p class="card-subtitle mb-2 text-muted">Temp: 
                                    <span class="fiveDay-temp"> &deg;F</span></p>
                                <p class="card-subtitle mb-2 text-muted">Wind: 
                                    <span id="fiveDay-wind">MPH</span></p> 
                                <p class="card-subtitle mb-2 text-muted">Humidity: <span id="fiveDay-humid">%</span></p>       
                            </div>
                        </div>
                    </div>
                    <div class="cool-sm-10 col-md-4 offset-lg-1 col-lg-2 p-1">
                        <div class="card day-3 m-0 text-center">
                            <div class="card-body p-1">
                                <p class="card-title"></p>
                                <img class="fiveDay-img mb-2"/>
                                <p class="card-subtitle mb-2 text-muted">Temp: 
                                    <span class="fiveDay-temp"> &deg;F</span></p>
                                <p class="card-subtitle mb-2 text-muted">Wind: 
                                    <span id="fiveDay-wind">MPH</span></p> 
                                <p class="card-subtitle mb-2 text-muted">Humidity: <span id="fiveDay-humid">%</span></p>       
                            </div>
                        </div>
                    </div>
                    <div class="cool-sm-10 col-md-4 offset-lg-1 col-lg-2 p-1">
                        <div class="card day-4 m-0 text-center">
                            <div class="card-body p-1">
                                <p class="card-title"></p>
                                <img class="fiveDay-img mb-2"/>
                                <p class="card-subtitle mb-2 text-muted">Temp: 
                                    <span class="fiveDay-temp"> &deg;F</span></p>
                                <p class="card-subtitle mb-2 text-muted">Wind: 
                                    <span id="fiveDay-wind">MPH</span></p> 
                                <p class="card-subtitle mb-2 text-muted">Humidity: <span id="fiveDay-humid">%</span></p>       
                            </div>
                        </div>
                    </div> 
                    <div class="cool-sm-10 col-md-4 offset-lg-1 col-lg-2 p-1">
                        <div class="card day-5 m-0 text-center">
                            <div class="card-body p-1">
                                <p class="card-title"></p>
                                <img class="fiveDay-img mb-2"/>
                                <p class="card-subtitle mb-2 text-muted">Temp: 
                                    <span class="fiveDay-temp"> &deg;F</span></p>
                                <p class="card-subtitle mb-2 text-muted">Wind: 
                                    <span id="fiveDay-wind">MPH</span></p> 
                                <p class="card-subtitle mb-2 text-muted">Humidity: <span id="fiveDay-humid">%</span></p>       
                            </div>
                        </div>
                    </div>                            
                </div>
            </div>
        </div>
        
        <div class="col-sm-12 col-md-3 left-panel order-md-1">
            <form>
                <div class="for-row">
                    <div class="form-group col-8">
                        <label for="city-input">Search for a City:</label>
                        <input type="text" placeholder="City" class="form-control" id="city-input">
                    </div>
                    <div class="col-auto">
                        <button type="submit" class="btn btn-primary mb-2 align-text-center" id="search-btn">Search <i class="fas fa-search"></i></button>
                    </div>
                </div>
            </form>

            <div class="row recent-searches mt-3">
                <div class="col-sm-12">
                    <h2>Recent searches:</h2>
                </div>
            </div>
            <div class="row cityList m-0">

            </div>
            </div>
        </div>
    </main>
</body>
</html>
